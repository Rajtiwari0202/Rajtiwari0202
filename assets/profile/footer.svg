<svg width="1200" height="180" viewBox="0 0 1200 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Raj Tiwari profile footer</title>
  <desc id="desc">A dark blue and teal footer banner for Raj Tiwari's GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0B2B63"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="line" x1="180" y1="85" x2="1020" y2="85" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#67E8F9" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
